name: Integration Build

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: [v*]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  JDK_RELEASE: 17
  JDK_CURRENT: 25
  NODE_LTS: 22
  SBT_OPTS: >- # Use all available resources
    -Xmx10G
    -Xms6G
    -Xss8M
    -XX:ReservedCodeCacheSize=512M

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test / ${{ matrix.platform-name }} / JDK ${{ matrix.java }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        java: [17, 25]
        os: [ubuntu-latest]
        platform: [native, js, jvm]
        include:
          # Display names for base matrix
          - platform: native
            platform-name: Native
          - platform: js
            platform-name: JS
          - platform: jvm
            platform-name: JVM
          # Native platform tested on all OS
          - java: 17
            os: macos-latest
            platform: native
            platform-name: Native
          - java: 25
            os: macos-latest
            platform: native
            platform-name: Native
          - java: 17
            os: windows-latest
            platform: native
            platform-name: Native
          - java: 25
            os: windows-latest
            platform: native
            platform-name: Native

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java ${{ matrix.java }}
        id: setup-java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          check-latest: true
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Coursier cache
        uses: coursier/cache-action@v7

      - name: Set up Node.js
        if: matrix.platform == 'js'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_LTS }}

      # Scala Native toolchains per OS
      - name: Install LLVM/Clang toolchain (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu') && matrix.platform == 'native'
        shell: bash
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang lld llvm libuv1-dev

      - name: Install LLVM toolchain (macOS)
        if: startsWith(matrix.os, 'macos') && matrix.platform == 'native'
        shell: bash
        run: |
          brew update
          brew install llvm libuv || true
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install LLVM toolchain (Windows)
        if: startsWith(matrix.os, 'windows') && matrix.platform == 'native'
        shell: pwsh
        run: |
          choco install -y llvm
          vcpkg install libuv:x64-windows
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "LIBRARY_PATH=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C_INCLUDE_PATH=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\include" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Compile & Test (${{ matrix.platform }})
        shell: bash
        env:
          # Helps Scala Native reliably find LLVM tools on Windows
          CC: ${{ startsWith(matrix.os, 'windows') && 'clang' || '' }}
          AR: ${{ startsWith(matrix.os, 'windows') && 'llvm-ar' || '' }}
        run: sbt -Dsbt.ci=true "emile-${{ matrix.platform }}/test"

      - name: Package Deployment Artefacts (${{ matrix.platform }})
        shell: bash
        run: sbt -Dsbt.ci=true "emile-${{ matrix.platform }}/package"

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java ${{ env.JDK_CURRENT }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JDK_CURRENT }}
          check-latest: true
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Coursier cache
        uses: coursier/cache-action@v7

      - name: Verify Source Formatting
        id: scalafmt
        continue-on-error: true
        run: sbt -Dsbt.ci=true scalafmtCheckAll

      - name: Verify Linting Conformity
        id: scalafix
        continue-on-error: true
        run: sbt -Dsbt.ci=true "scalafixAll --check"

      - name: Verify File Header Conformity
        id: headers
        continue-on-error: true
        run: sbt -Dsbt.ci=true headerCheckAll

      - name: Check for failures
        if: always()
        run: |
          failed=""
          [[ "${{ steps.scalafmt.outcome }}" == "failure" ]] && failed="$failed scalafmtCheckAll"
          [[ "${{ steps.scalafix.outcome }}" == "failure" ]] && failed="$failed scalafixAll"
          [[ "${{ steps.headers.outcome }}" == "failure" ]] && failed="$failed headerCheckAll"
          if [[ -n "$failed" ]]; then
            echo "::error::Static analysis checks failed:$failed"
            exit 1
          fi

  publish:
    name: Publish to Maven Central
    needs: [build-test, static-analysis]
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Setup GPG Key and Agent"
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.SIGNING_KEY }}
          trust_level: 5

      - name: Set up Java ${{ env.JDK_RELEASE }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JDK_RELEASE }}
          check-latest: true
          cache: sbt

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Coursier cache
        uses: coursier/cache-action@v7

      - name: Publish Release Artefacts (jvm/js/native)
        env:
          PUBLISH_USER: ${{ secrets.PUBLISH_USER }}
          PUBLISH_USER_PASSPHRASE: ${{ secrets.PUBLISH_USER_PASSPHRASE }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
        run: sbt -Dsbt.ci=true "clean; publishSigned; sonatypeBundleRelease"
