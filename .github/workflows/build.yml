name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  SBT_OPTS: >-
    -Xmx10G
    -Xms6G
    -Xss4M
    -XX:ReservedCodeCacheSize=512M

jobs:
  test_native:
    name: "[${{ matrix.family }}-${{ matrix.arch }}${{ matrix.runtime }}] Tests (${{ matrix.link }} Linked)"
    strategy:
      fail-fast: false
      matrix:
        include:
          # glibc on Oracle Linux 10 - the RHEL 10 libuv 1.51.x floor.
          - link: Dynamic
            family: linux
            arch: x86_64
            runtime: "-glibc"
            runner: ubuntu-24.04
            dockerImage: shuwariafrica/el10-jdk:17
          - link: Dynamic
            family: linux
            arch: aarch64
            runtime: "-glibc"
            runner: ubuntu-24.04-arm
            dockerImage: shuwariafrica/el10-jdk:17
          # musl on Alpine 3.23 (release track, libuv 1.51.x, ships libuv-static for the static link).
          # These fail until scala-native PR #4934 (sigaltstack/SIGSTKSZ fix for musl) merges and a SN
          # release ships - remove `continueOnError` on all four musl entries then.
          - link: Dynamic
            family: linux
            arch: x86_64
            runtime: "-musl"
            runner: ubuntu-24.04
            dockerImage: shuwariafrica/alpine-jdk:17
            continueOnError: true
          - link: Dynamic
            family: linux
            arch: aarch64
            runtime: "-musl"
            runner: ubuntu-24.04-arm
            dockerImage: shuwariafrica/alpine-jdk:17
            continueOnError: true
          - link: Static
            family: linux
            arch: x86_64
            runtime: "-musl"
            runner: ubuntu-24.04
            dockerImage: shuwariafrica/alpine-jdk:17
            continueOnError: true
          - link: Static
            family: linux
            arch: aarch64
            runtime: "-musl"
            runner: ubuntu-24.04-arm
            dockerImage: shuwariafrica/alpine-jdk:17
            continueOnError: true
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.continueOnError == true }}
    env:
      DOCKER_IMAGE: ${{ matrix.dockerImage }}
      EMILE_STATIC_LINK: ${{ matrix.link == 'Static' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Coursier cache
        uses: coursier/cache-action@v8
      - name: "[host] Run tests"
        run: timeout -k 30s 20m ./project/scripts/run-sbt.sh -batch "emile/testOnly *" "emile-fs2/testOnly *"
      - name: "[host] Static-linkage assertion"
        if: matrix.link == 'Static'
        run: |
          emile_bin=$(find target/out -type f -name 'emile-test' -print -quit)
          fs2_bin=$(find target/out -type f -name 'emile-fs2-test' -print -quit)
          test -n "$emile_bin" || { echo "emile static test binary not found"; exit 1; }
          test -n "$fs2_bin"   || { echo "emile-fs2 static test binary not found"; exit 1; }
          for bin in "$emile_bin" "$fs2_bin"; do
            echo "--- $bin"
            file_out=$(file "$bin")
            ldd_out=$(ldd "$bin" 2>&1 || true)
            echo "$file_out"
            echo "ldd: $ldd_out"
            echo "$file_out" | grep -q 'statically linked'
            echo "$ldd_out" | grep -q 'not a dynamic executable'
          done

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-24.04
    container: shuwariafrica/el10-jdk:17
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Coursier cache
        uses: coursier/cache-action@v8
      - name: Verify Source Formatting
        id: scalafmt
        continue-on-error: true
        run: timeout -k 30s 10m sbt -batch scalafmtCheckAll scalafmtSbtCheck
      - name: Verify Linting Conformity
        id: scalafix
        continue-on-error: true
        run: timeout -k 30s 10m sbt -batch "scalafixAll --check"
      - name: Verify File Header Conformity
        id: headers
        continue-on-error: true
        run: timeout -k 30s 10m sbt -batch headerCheckAll
      - name: Check for failures
        if: always()
        run: |
          failed=""
          [[ "${{ steps.scalafmt.outcome }}" == "failure" ]] && failed="$failed scalafmtCheckAll"
          [[ "${{ steps.scalafix.outcome }}" == "failure" ]] && failed="$failed scalafixAll"
          [[ "${{ steps.headers.outcome }}" == "failure" ]] && failed="$failed headerCheckAll"
          if [[ -n "$failed" ]]; then
            echo "::error::Static analysis checks failed:$failed"
            exit 1
          fi

  stress:
    name: "Concurrency invariants"
    runs-on: ubuntu-24.04
    env:
      DOCKER_IMAGE: shuwariafrica/el10-jdk:17
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Coursier cache
        uses: coursier/cache-action@v8
      - name: "Run concurrency-invariant suites"
        run: timeout -k 30s 25m ./project/scripts/run-sbt.sh -batch "emile-stress/testOnly *"

  publish:
    name: Publish Binaries
    needs: [test_native, static-analysis, stress]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    container: shuwariafrica/el10-jdk:17
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Import signing key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.SIGNING_KEY }}
      - name: Set up Coursier cache
        uses: coursier/cache-action@v8
      - name: Publish Binaries
        run: timeout -k 30s 30m sbt -batch publishSigned
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      - name: Publish Maven Central Release
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
        run: timeout -k 30s 90m sbt -batch sonaRelease
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      - name: Publish GitHub Release
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease_flag=""
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag \
            $prerelease_flag

  dependency-graph:
    name: Update Dependency Graph
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    container: shuwariafrica/el10-jdk:17
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up sbt
        uses: sbt/setup-sbt@v1
      - name: Submit Dependency Graph
        uses: scalacenter/sbt-dependency-submission@v3
